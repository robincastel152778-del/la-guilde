<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>La Guilde — QG des soirées jeux</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0F1118; --panel:#171A24; --panel2:#1D2130; --border:#262B3B;
    --text:#E9EBF5; --muted:#8A90A6; --accent:#8B7CFF; --accent-soft:rgba(139,124,255,.14);
    --gold:#FFC857; --green:#4ADE80; --coral:#FF6B81;
    --radius:14px;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{background:var(--bg); color:var(--text); font-family:'Outfit',system-ui,sans-serif; min-height:100%;}
  body{font-size:15px; line-height:1.5;}
  ::selection{background:var(--accent); color:#fff;}
  button{font-family:inherit;}
  a{color:var(--accent);}

  .pixel{font-family:'Silkscreen',monospace;}

  /* ===== Header ===== */
  header{position:sticky; top:0; z-index:40; background:rgba(15,17,24,.92); backdrop-filter:blur(8px); border-bottom:1px solid var(--border);}
  .head-inner{max-width:1100px; margin:0 auto; padding:12px 18px; display:flex; align-items:center; gap:14px; flex-wrap:wrap;}
  .logo{font-family:'Silkscreen',monospace; font-size:18px; letter-spacing:1px; color:var(--gold); text-shadow:0 0 18px rgba(255,200,87,.35);}
  .logo span{color:var(--accent);}
  .head-spacer{flex:1;}
  .profile-chip{display:flex; align-items:center; gap:8px; background:var(--panel); border:1px solid var(--border); border-radius:999px; padding:5px 12px 5px 6px; font-weight:600; font-size:13px;}
  .head-btn{background:none; border:1px solid var(--border); color:var(--muted); border-radius:999px; padding:6px 12px; font-size:12.5px; cursor:pointer; transition:.15s;}
  .head-btn:hover{color:var(--text); border-color:var(--accent);}

  nav{max-width:1100px; margin:0 auto; padding:0 18px 10px; display:flex; gap:8px; flex-wrap:wrap;}
  .tab{background:none; border:1px solid var(--border); color:var(--muted); border-radius:10px; padding:7px 14px; font-size:13.5px; font-weight:600; cursor:pointer; transition:.15s; position:relative;}
  .tab:hover{color:var(--text);}
  .tab.active{background:var(--accent-soft); border-color:var(--accent); color:var(--text);}
  .tab .badge{position:absolute; top:-7px; right:-7px; background:var(--coral); color:#fff; font-size:11px; font-weight:700; border-radius:999px; min-width:18px; height:18px; display:flex; align-items:center; justify-content:center; padding:0 5px;}

  main{max-width:1100px; margin:0 auto; padding:22px 18px 80px;}

  /* ===== Cards / sections ===== */
  .eyebrow{font-family:'Silkscreen',monospace; font-size:10.5px; letter-spacing:1px; color:var(--accent); text-transform:uppercase; margin-bottom:10px;}
  .card{background:var(--panel); border:1px solid var(--border); border-radius:var(--radius); padding:18px; margin-bottom:18px;}
  .grid2{display:grid; grid-template-columns:1fr 1fr; gap:18px;}
  @media (max-width:760px){ .grid2{grid-template-columns:1fr;} }

  .empty{color:var(--muted); font-size:13.5px; padding:8px 0;}

  /* ===== Player chips ===== */
  .pchip{display:inline-flex; align-items:center; gap:6px; background:var(--panel2); border:1px solid var(--border); border-radius:999px; padding:3px 10px 3px 4px; font-size:12.5px; font-weight:600; margin:2px 3px 2px 0;}
  .pdot{width:18px; height:18px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:9px; font-weight:800; color:#0F1118;}
  .pchip .score{color:var(--gold); font-weight:700;}

  /* ===== Envy gauge ===== */
  .gauge-wrap{display:flex; align-items:center; gap:8px;}
  .gauge{position:relative; width:110px; height:10px; background:var(--panel2); border:1px solid var(--border); border-radius:4px; overflow:hidden; flex-shrink:0;}
  .gauge-fill{position:absolute; inset:0; background:linear-gradient(90deg,var(--accent),var(--gold)); border-radius:3px;}
  .gauge-ticks{position:absolute; inset:0; background:repeating-linear-gradient(90deg,transparent 0 calc(10% - 1px),rgba(15,17,24,.85) calc(10% - 1px) 10%);}
  .gauge-num{font-weight:700; color:var(--gold); font-size:13px; min-width:34px;}

  /* ===== Action buttons (espace perso) ===== */
  .actions{display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:12px; margin-bottom:20px;}
  .action-btn{background:var(--panel); border:1px solid var(--border); border-radius:var(--radius); padding:16px 14px; cursor:pointer; text-align:left; color:var(--text); transition:.15s; position:relative;}
  .action-btn:hover{border-color:var(--accent); background:var(--panel2); transform:translateY(-1px);}
  .action-btn .icon{font-size:20px; margin-bottom:6px; display:block;}
  .action-btn .label{font-weight:700; font-size:14.5px;}
  .action-btn .hint{color:var(--muted); font-size:12px; margin-top:2px;}
  .action-btn .count{position:absolute; top:10px; right:12px; background:var(--coral); color:#fff; font-size:12px; font-weight:700; border-radius:999px; min-width:20px; height:20px; display:flex; align-items:center; justify-content:center; padding:0 6px;}

  /* ===== Game rows ===== */
  .game-row{border-bottom:1px solid var(--border); padding:12px 0;}
  .game-row:last-child{border-bottom:none;}
  .game-head{display:flex; align-items:center; gap:10px; flex-wrap:wrap; cursor:pointer;}
  .game-name{font-weight:700; font-size:15px;}
  .game-meta{color:var(--muted); font-size:12.5px;}
  .tag{display:inline-block; background:var(--accent-soft); color:var(--accent); border-radius:6px; padding:1px 8px; font-size:11.5px; font-weight:600; margin:2px 3px 0 0;}
  .price{font-size:12.5px; font-weight:700; color:var(--green);}
  .price.paid{color:var(--gold);}
  .game-detail{display:none; padding:10px 0 4px; border-top:1px dashed var(--border); margin-top:10px;}
  .game-row.open .game-detail{display:block;}
  .detail-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(170px,1fr)); gap:6px 14px; margin:8px 0;}
  .detail-line{display:flex; align-items:center; gap:8px; font-size:13px;}
  .comment{background:var(--panel2); border-left:3px solid var(--accent); border-radius:0 8px 8px 0; padding:8px 12px; font-size:13px; color:var(--muted); margin-top:8px; font-style:italic;}
  .mini-btn{background:none; border:1px solid var(--border); color:var(--muted); border-radius:8px; padding:4px 10px; font-size:12px; cursor:pointer; transition:.15s;}
  .mini-btn:hover{color:var(--text); border-color:var(--accent);}
  .mini-btn.danger:hover{color:var(--coral); border-color:var(--coral);}
  .game-link{color:inherit; text-decoration:none; border-bottom:1px dashed rgba(139,124,255,.5);}
  .game-link:hover{color:var(--accent); border-bottom-style:solid;}
  .old-price{color:var(--muted); text-decoration:line-through; font-size:12px; font-weight:600;}
  .promo-badge{display:inline-flex; align-items:center; background:rgba(255,107,129,.15); color:var(--coral); border-radius:6px; padding:1px 8px; font-size:11.5px; font-weight:700; white-space:nowrap;}
  .trash-btn{background:none; border:none; color:var(--muted); cursor:pointer; font-size:15px; padding:2px 7px; border-radius:7px; float:right; line-height:1.2;}
  .trash-btn:hover{color:var(--coral); background:rgba(255,107,129,.12);}
  .pdot{overflow:hidden; flex-shrink:0;}
  .pemoji{font-size:12px; line-height:1;}
  .pdot.big{width:44px; height:44px; font-size:16px;}
  .pdot.big .pemoji{font-size:24px;}
  .pdot.md{width:32px; height:32px; font-size:12px;}
  .pdot.md .pemoji{font-size:18px;}
  .pdot.xl{width:76px; height:76px; font-size:26px;}
  .pdot.xl .pemoji{font-size:44px;}
  .avatar-img{width:100%; height:100%; object-fit:cover; border-radius:50%;}
  .sdot{display:inline-block; width:10px; height:10px; border-radius:50%; vertical-align:middle; flex-shrink:0;}
  .social-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(210px,1fr)); gap:12px;}
  .social-card{background:var(--panel2); border:1px solid var(--border); border-radius:12px; padding:16px 14px; cursor:pointer; color:var(--text); text-align:center; transition:.15s; display:flex; flex-direction:column; align-items:center; gap:7px; font-family:inherit; font-size:inherit;}
  .social-card:hover{border-color:var(--accent); transform:translateY(-2px);}
  .social-name{font-weight:800; font-size:15.5px; display:flex; align-items:center; gap:7px;}
  .social-status{font-size:12px; color:var(--muted);}
  .social-stats{font-size:12px; color:var(--muted); line-height:1.5;}
  .avatar-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(46px,1fr)); gap:6px; max-height:230px; overflow-y:auto; padding:4px;}
  .avatar-opt{font-size:21px; background:var(--panel2); border:1px solid var(--border); border-radius:10px; padding:8px 0; cursor:pointer; transition:.1s;}
  .avatar-opt:hover{border-color:var(--gold);}
  .avatar-opt.sel{border-color:var(--gold); background:var(--accent-soft);}
  .status-btn{display:inline-flex; align-items:center; gap:8px;}
  .suggest-wrap{position:relative;}
  .suggest{position:absolute; top:100%; left:0; right:0; background:var(--panel2); border:1px solid var(--accent); border-radius:10px; margin-top:4px; z-index:60; overflow:hidden; box-shadow:0 10px 30px rgba(0,0,0,.5);}
  .suggest-item{display:flex; align-items:center; gap:10px; padding:8px 10px; cursor:pointer; border-bottom:1px solid var(--border);}
  .suggest-item:last-child{border-bottom:none;}
  .suggest-item:hover{background:var(--accent-soft);}
  .suggest-item img{width:60px; height:23px; object-fit:cover; border-radius:4px; flex-shrink:0;}
  .suggest-name{flex:1; font-size:13.5px; font-weight:600; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .suggest-price{font-size:12px; color:var(--gold); font-weight:700; flex-shrink:0;}
  .steam-pop{position:fixed; z-index:300; width:300px; background:var(--panel); border:1px solid var(--accent); border-radius:12px; overflow:hidden; box-shadow:0 14px 40px rgba(0,0,0,.6); pointer-events:none; animation:toastin .15s ease;}
  .steam-pop img{width:100%; display:block;}
  .steam-pop .sp-body{padding:10px 12px;}
  .steam-pop .sp-name{font-weight:800; font-size:14.5px;}
  .steam-pop .sp-desc{font-size:12px; color:var(--muted); margin-top:4px; line-height:1.45;}
  .steam-pop .sp-meta{margin-top:7px; display:flex; gap:5px; flex-wrap:wrap; align-items:center;}
  .avatar-pop{position:fixed; z-index:300; background:var(--panel); border:1px solid var(--accent); border-radius:14px; padding:14px 18px; text-align:center; box-shadow:0 14px 40px rgba(0,0,0,.6); pointer-events:none; animation:toastin .15s ease;}
  .avatar-pop-circle{width:190px; height:190px; border-radius:50%; overflow:hidden; display:flex; align-items:center; justify-content:center; margin:0 auto;}
  .avatar-pop-name{font-weight:800; margin-top:9px; font-size:15.5px;}
  .avatar-pop-tag{font-style:italic; color:var(--gold); font-size:12.5px; margin-top:2px;}

  /* ===== Arc cards ===== */
  .arc{background:var(--panel2); border:1px solid var(--border); border-radius:12px; padding:12px 14px; margin-bottom:10px;}
  .arc.done{opacity:.55;}
  .arc-name{font-weight:700; font-size:14.5px;}
  .arc-game{color:var(--gold); font-weight:600; font-size:13px;}
  .arc-meta{color:var(--muted); font-size:12px; margin-top:2px;}
  .arc-status{display:inline-block; font-size:11px; font-weight:700; border-radius:6px; padding:1px 8px; margin-left:6px; vertical-align:middle;}
  .arc-status.on{background:rgba(74,222,128,.15); color:var(--green);}
  .arc-status.off{background:rgba(138,144,166,.15); color:var(--muted);}
  .arc-status.soon{background:rgba(139,124,255,.18); color:var(--accent);}

  /* ===== Bandeaux de campagne v2 ===== */
  .arc2{display:flex; background:var(--panel2); border:1px solid var(--border); border-radius:12px; margin-bottom:12px; overflow:hidden; position:relative;}
  .arc2.done{opacity:.55;}
  .arc2.done-win{opacity:.72; border-color:rgba(74,222,128,.55); background:linear-gradient(0deg, rgba(74,222,128,.07), rgba(74,222,128,.07)), var(--panel2);}
  .arc2.done-fail{opacity:.72; border-color:rgba(255,107,129,.55); background:linear-gradient(0deg, rgba(255,107,129,.06), rgba(255,107,129,.06)), var(--panel2);}
  .arc-status.win{background:rgba(74,222,128,.2); color:var(--green);}
  .arc-status.fail{background:rgba(255,107,129,.2); color:var(--coral);}
  .arc2-img{width:225px; aspect-ratio:460/215; align-self:center; margin:12px 0 12px 12px; flex-shrink:0; position:relative; border-radius:9px; overflow:hidden; background:linear-gradient(135deg, var(--accent-soft), var(--panel)); display:flex; align-items:center; justify-content:center;}
  .grid-main{display:grid; grid-template-columns:3fr 2fr; gap:18px;}
  .grid-main .arc2-img{width:250px;}
  @media (max-width:860px){ .grid-main{grid-template-columns:1fr;} .grid-main .arc2-img{width:225px;} }
  .arc2-fallback{font-size:36px; opacity:.65;}
  .arc2-img img{position:absolute; inset:0; width:100%; height:100%; object-fit:cover;}
  .arc2-body{flex:1; padding:12px 14px 13px; min-width:0;}
  .arc2-title{font-weight:800; font-size:17.5px; display:flex; align-items:center; gap:8px; flex-wrap:wrap; padding-right:28px;}
  .arc2-cols{display:flex; gap:16px; margin-top:9px; flex-wrap:wrap;}
  .arc2-people{display:flex; flex-wrap:wrap; align-content:flex-start; align-items:flex-start; max-width:250px; padding-left:21px;}
  .arc2-people .pdot{width:64px; height:64px; font-size:21px; border:2px solid var(--panel2); margin-left:-21px; margin-bottom:4px;}
  .arc2-people .pemoji{font-size:43px;}
  .arc2-info{flex:1; min-width:190px;}
  .arc2-goal{font-size:14.5px; font-weight:650; margin-top:5px;}
  .btn-join{margin-top:10px; padding:9px 20px; font-size:14.5px;}
  @media (max-width:560px){ .arc2{flex-direction:column;} .arc2-img{width:auto; align-self:stretch; margin:10px 10px 0; aspect-ratio:2.4;} }

  .status-select{background:var(--panel2); border:1px solid var(--border); border-radius:10px; padding:7px 10px; color:var(--text); font-family:inherit; font-size:13px; max-width:280px;}
  .status-select:focus{outline:none; border-color:var(--accent);}
  .col-opt{width:26px; height:26px; border-radius:50%; border:2px solid transparent; cursor:pointer; padding:0;}
  .col-opt.sel{border-color:#fff; box-shadow:0 0 0 2px var(--gold);}
  .lib-row{display:flex; gap:14px; align-items:center; border-bottom:1px solid var(--border); padding:12px 0;}
  .lib-row:last-child{border-bottom:none;}
  .lib-img{width:140px; aspect-ratio:460/215; flex-shrink:0; position:relative; border-radius:8px; overflow:hidden; background:linear-gradient(135deg, var(--accent-soft), var(--panel)); display:flex; align-items:center; justify-content:center;}
  .lib-img img{position:absolute; inset:0; width:100%; height:100%; object-fit:cover;}
  .week-nav{display:flex; align-items:center; justify-content:center; gap:12px; margin-bottom:10px; font-size:14px;}
  .week-grid{width:100%; border-collapse:separate; border-spacing:3px; table-layout:fixed;}
  .week-grid th{font-size:11px; color:var(--muted); padding:2px; font-weight:700; text-transform:uppercase;}
  .week-grid th .dnum{display:block; font-size:12px; color:var(--text); font-weight:800;}
  .week-grid td{height:32px; text-align:center; cursor:pointer; font-size:12px; border-radius:6px; background:var(--panel2); border:1px solid var(--border); user-select:none;}
  .week-grid td.rowlabel{cursor:default; color:var(--muted); font-size:10.5px; width:56px; background:none; border:none; text-align:right; padding-right:6px;}
  .week-grid td.cell-free{background:rgba(74,222,128,.4); border-color:rgba(74,222,128,.5); color:#eafff2; font-weight:700;}
  .week-grid td.cell-locked{background:rgba(139,124,255,.4); border-color:var(--accent); cursor:not-allowed;}
  .week-grid td.cell-past{opacity:.28; cursor:default; pointer-events:none;}

  /* ===== Top 5 ===== */
  .top-row{display:flex; align-items:center; gap:12px; padding:9px 0; border-bottom:1px solid var(--border);}
  .top-row:last-child{border-bottom:none;}
  .rank{font-family:'Silkscreen',monospace; font-size:14px; color:var(--gold); width:26px; flex-shrink:0; text-align:center;}
  .rank.r1{font-size:17px; text-shadow:0 0 14px rgba(255,200,87,.5);}
  .top-name{font-weight:700; flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .top-count{color:var(--muted); font-size:11.5px;}

  /* ===== Onboarding ===== */
  .onboard{max-width:560px; margin:8vh auto 0; text-align:center; padding:0 18px;}
  .onboard h1{font-family:'Silkscreen',monospace; font-size:26px; color:var(--gold); margin-bottom:6px; text-shadow:0 0 24px rgba(255,200,87,.35);}
  .onboard h1 span{color:var(--accent);}
  .onboard p{color:var(--muted); margin-bottom:26px;}
  .profiles{display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:12px;}
  .profile-btn{background:var(--panel); border:1px solid var(--border); border-radius:var(--radius); padding:18px 10px; cursor:pointer; color:var(--text); font-weight:700; font-size:15px; display:flex; flex-direction:column; align-items:center; gap:10px; transition:.15s;}
  .profile-btn:hover{border-color:var(--accent); background:var(--panel2); transform:translateY(-2px);}
  .profile-btn .pdot{width:40px; height:40px; font-size:15px;}

  /* ===== Modal ===== */
  .overlay{position:fixed; inset:0; background:rgba(8,9,14,.75); backdrop-filter:blur(3px); z-index:100; display:flex; align-items:flex-start; justify-content:center; padding:5vh 14px; overflow-y:auto;}
  .modal{background:var(--panel); border:1px solid var(--border); border-radius:16px; width:100%; max-width:560px; padding:22px;}
  .modal h2{font-size:17px; font-weight:800; margin-bottom:2px;}
  .modal .sub{color:var(--muted); font-size:13px; margin-bottom:16px;}
  .field{margin-bottom:14px;}
  .field label{display:block; font-size:12.5px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; margin-bottom:6px;}
  .field input[type=text],.field input[type=url],.field input[type=number],.field input[type=date],.field textarea,.field select{
    width:100%; background:var(--panel2); border:1px solid var(--border); border-radius:10px; padding:9px 12px; color:var(--text); font-family:inherit; font-size:14px;
  }
  .field textarea{resize:vertical; min-height:64px;}
  .field input:focus,.field textarea:focus,.field select:focus{outline:none; border-color:var(--accent);}
  .chips{display:flex; flex-wrap:wrap; gap:6px;}
  .chip-opt{background:var(--panel2); border:1px solid var(--border); color:var(--muted); border-radius:999px; padding:5px 13px; font-size:13px; font-weight:600; cursor:pointer; transition:.12s;}
  .chip-opt.sel{background:var(--accent-soft); border-color:var(--accent); color:var(--text);}
  .score-picker{display:flex; flex-wrap:wrap; gap:5px;}
  .score-btn{width:34px; height:34px; border-radius:9px; background:var(--panel2); border:1px solid var(--border); color:var(--muted); font-weight:700; font-size:13.5px; cursor:pointer; transition:.12s;}
  .score-btn:hover{border-color:var(--gold);}
  .score-btn.sel{background:var(--gold); border-color:var(--gold); color:#0F1118;}
  .modal-actions{display:flex; gap:10px; justify-content:flex-end; margin-top:18px;}
  .btn{border-radius:10px; padding:9px 18px; font-weight:700; font-size:14px; cursor:pointer; border:1px solid var(--border); background:var(--panel2); color:var(--muted); transition:.15s;}
  .btn:hover{color:var(--text);}
  .btn.primary{background:var(--accent); border-color:var(--accent); color:#fff;}
  .btn.primary:hover{filter:brightness(1.1);}
  .rate-item{border-bottom:1px solid var(--border); padding:12px 0;}
  .rate-item:last-child{border-bottom:none;}
  .rate-head{display:flex; align-items:baseline; gap:10px; flex-wrap:wrap; margin-bottom:8px;}
  .err{color:var(--coral); font-size:13px; margin-top:8px; display:none;}

  /* ===== Toast ===== */
  .toast{position:fixed; bottom:22px; left:50%; transform:translateX(-50%); background:var(--panel2); border:1px solid var(--accent); color:var(--text); border-radius:12px; padding:10px 20px; font-weight:600; font-size:14px; z-index:200; box-shadow:0 8px 30px rgba(0,0,0,.5); animation:toastin .25s ease;}
  @keyframes toastin{from{opacity:0; transform:translateX(-50%) translateY(10px);} to{opacity:1; transform:translateX(-50%) translateY(0);}}

  /* ===== Loading ===== */
  .loading{text-align:center; padding:14vh 20px; color:var(--muted);}
  .loading .pixel{color:var(--accent); font-size:15px; animation:blink 1.1s steps(2) infinite;}
  @keyframes blink{50%{opacity:.35;}}

  .sortbar{display:flex; gap:10px; align-items:center; margin-bottom:12px; flex-wrap:wrap;}
  .sortbar input,.sortbar select{background:var(--panel2); border:1px solid var(--border); border-radius:10px; padding:7px 12px; color:var(--text); font-family:inherit; font-size:13.5px;}
  .sortbar input{flex:1; min-width:160px;}

  @media (prefers-reduced-motion:reduce){ *{animation:none !important; transition:none !important;} }

  /* ===== Cosmétiques équipés (bordures, bannières, couleurs de pseudo) ===== */
  .pdot-wrap{position:relative; display:inline-flex; flex-shrink:0; vertical-align:middle;}
  .pdot-wrap .pdot-frame{position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    width:205%; height:205%; pointer-events:none; z-index:2;}
  .profile-banner{height:150px; border-radius:14px 14px 0 0; background-size:cover; background-position:center;
    margin-bottom:-58px; position:relative;}
  .profile-banner::after{content:""; position:absolute; inset:0; border-radius:14px 14px 0 0;
    background:linear-gradient(180deg,transparent 35%,var(--panel) 96%);}

    border-radius:0 0 14px 14px; padding-left:34px;}
  .gname{font-weight:800;}
  .gname.clip,.gc-encre,.gc-crepuscule,.gc-agrume,.gc-ocean,.gc-poison,.gc-vernis-pro,.gc-chrome,.gc-or-liquide,
  .gc-hologramme,.gc-braise,.gc-givre,.gc-arc-en-ciel,.gc-amethyste,.gc-sakura,.gc-emeraude,.gc-cuivre{
    -webkit-background-clip:text; background-clip:text; color:transparent; background-size:200% auto;}
  .gc-or-guilde{color:var(--gold);} .gc-sang{color:#FF4D4D;} .gc-menthe{color:#7CE7C4;}
  .gc-crepuscule{background-image:linear-gradient(90deg,#8B7CFF,#FF6B81);}
  .gc-agrume{background-image:linear-gradient(90deg,#FF9D5C,#FFD93D);}

  .gc-poison{background-image:linear-gradient(90deg,#4ADE80,#B78CFF);}
  .gc-vernis-pro{background-image:linear-gradient(100deg,#8B7CFF 0 38%,#fff 50%,#8B7CFF 62% 100%);animation:g-sheen 1.5s linear infinite;}
  .gc-chrome{background-image:linear-gradient(100deg,#c8ccdd 0 40%,#fff 50%,#c8ccdd 60% 100%);animation:g-sheen 2.6s linear infinite;}
  .gc-or-liquide{background-image:linear-gradient(100deg,#FFD24A 0 40%,#fff7d6 50%,#E8A33A 60% 100%);animation:g-sheen 2.8s linear infinite;}
  .gc-hologramme{background-image:linear-gradient(90deg,#ff6ad5,#5EC8F2,#7CE7C4,#FFD93D,#ff6ad5);background-size:300% auto;animation:g-holo 5s linear infinite;}
  .gc-braise{background-image:linear-gradient(0deg,#FF3D00,#FF9D00,#FFD93D);}
  .gc-givre{background-image:linear-gradient(100deg,#CFF4FF 0 40%,#fff 50%,#8FD8FF 60% 100%);animation:g-sheen 4.2s linear infinite;}
  .gc-neon-fusion{color:#fff;text-shadow:0 0 5px #b388ff,0 0 12px #8B7CFF,0 0 22px #8B7CFF;}
  .gc-cyber{color:#9dfcff;text-shadow:0 0 6px #00E5FF,0 0 16px #00E5FF;}
  .gc-arc-en-ciel{background-image:linear-gradient(90deg,#FF6B81,#FFD93D,#4ADE80,#5EC8F2,#B78CFF,#FF6B81);background-size:300% auto;animation:g-holo 3s linear infinite;}
  .gc-encre{background-image:linear-gradient(100deg,#31313d 0 42%,#c4c4d6 50%,#31313d 58% 100%);background-size:220% auto;animation:g-sheen 3.4s linear infinite;}
  .gc-amethyste{background-image:linear-gradient(90deg,#A24BFF,#E36BFF,#A24BFF);background-size:200% auto;animation:g-sheen 3.4s linear infinite;}
  .gc-sakura{background-image:linear-gradient(100deg,#ffd7e6 0 40%,#fff 50%,#ffb3d1 60% 100%);animation:g-sheen 4s linear infinite;}
  .gc-emeraude{background-image:linear-gradient(100deg,#3ef0b0 0 40%,#eafff6 50%,#12b98a 60% 100%);animation:g-sheen 3s linear infinite;}
  .gc-cuivre{background-image:linear-gradient(100deg,#E8894A 0 40%,#ffd9b0 50%,#B5652A 60% 100%);animation:g-sheen 2.9s linear infinite;}
  .gc-toxique{color:#c6ff6b;text-shadow:0 0 6px #7CFF6B,0 0 16px #7CFF6B;}
  @keyframes g-sheen{to{background-position:-200% center;}}
  @keyframes g-holo{to{background-position:300% center;}}
</style>
</head>
<body>
<div id="app"><div class="loading"><div class="pixel">CHARGEMENT DU QG...</div></div></div>

<script>
/* =====================================================
   LA GUILDE — QG des soirées jeux (front)
   Parle au serveur via l'API /api/* et reçoit les mises à
   jour des autres joueurs en temps réel (SSE).
   ===================================================== */

const GENRES = ['Coop','Survie','FPS','MOBA','Horreur','Sandbox','MMO','RPG','Stratégie','Battle Royale','Party game','Roguelike','Course','Simulation'];
const HUES = [265,45,150,200,330,20,95,230];
const STATUS = {
  green:  { c:'#4ADE80', label:'Dispo pour jouer à de nouvelles choses !' },
  orange: { c:'#FFC857', label:'À voir' },
  red:    { c:'#FF6B81', label:'Mes campagnes me prennent déjà beaucoup de temps' }
};
const AVATARS = ['🎮','🕹️','👾','🤖','🧙','🧝','🧛','🧟','🥷','🦸','🦹','👑','🐉','🦖','🦕','🐺','🦊','🐻','🐼','🐸','🐢','🐙','🦑','🦉','🦅','🦇','🐍','🦂','🕷️','🦈','🐲','👻','💀','☠️','👽','🛸','🔥','⚡','❄️','🌙','⭐','☄️','🗡️','⚔️','🛡️','🏹','🪄','🧪','💣','🎯'];
const TAGLINES = ['Rage quit imminent', 'AFK professionnel', '300h de jeu, toujours nul', '« Une dernière et j\u2019arrête »', 'Delu et le sait'];
const DAY_SLOTS = ['matin','aprem','18-20','20-22','22-00','00-02'];
const SLOT_LAB = { matin:'Matin', aprem:'Aprem', '18-20':'18h-20h', '20-22':'20h-22h', '22-00':'22h-00h', '00-02':'00h-02h' };
const DAY_LAB = ['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'];
const joinFrF = arr => arr.length<=1 ? (arr[0]||'') : arr.slice(0,-1).join(', ') + ' et ' + arr[arr.length-1];

let ME=null, MEMBERS=[], GAMES=[], ARCS=[], PROFILES={}, AVAIL=[], SLOTS_DATA=[], TAB='panneau', SOCIAL_SEL=null;

/* ---------- Couche API : toutes les données passent par le serveur ---------- */
async function apiGet(path){
  const r = await fetch(path);
  if(!r.ok) throw new Error('api ' + r.status);
  return r.json();
}
async function apiSend(path, method, body){
  const r = await fetch(path, { method, headers:{'Content-Type':'application/json'}, body: body ? JSON.stringify(body) : undefined });
  if(!r.ok){ toast('Erreur serveur — réessaie'); throw new Error('api ' + r.status); }
  return r.json().catch(()=>({}));
}
let COSMETICS = {};   /* cosmétiques équipés de chaque membre (bordure, bannière, couleur, statut) */
async function loadAll(){
  const s = await apiGet('/api/state');
  MEMBERS = s.members || []; GAMES = s.games || []; ARCS = s.arcs || []; PROFILES = s.profiles || {};
  AVAIL = s.avail || []; SLOTS_DATA = s.slots || [];
  GAMES.sort((a,b)=> new Date(a.addedAt) - new Date(b.addedAt));
  try { COSMETICS = await apiGet('/api/economy/all') || {}; } catch(e){ COSMETICS = COSMETICS || {}; }
}
/* Accès aux cosmétiques équipés d'un membre */
function cosmo(name, cat){ return (COSMETICS[name] || {})[cat] || null; }
/* Le profil choisi est mémorisé sur CE navigateur uniquement */
function loadProfile(){ try{ return localStorage.getItem('guilde:profile'); }catch(e){ return null; } }
function saveProfile(name){ try{ name===null ? localStorage.removeItem('guilde:profile') : localStorage.setItem('guilde:profile', name); }catch(e){} }

/* ---------- Utils ---------- */
const esc = s => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,7);
const fmtDate = iso => { try{ return new Date(iso).toLocaleDateString('fr-FR',{day:'numeric',month:'short',year:'numeric'}); }catch(e){ return iso; } };
function memberColor(name){
  const custom = (typeof PROFILES === 'object' && PROFILES[name]?.color) || null;
  if(custom) return custom;
  const i = MEMBERS.indexOf(name);
  const hue = HUES[(i>=0?i:Math.abs(hash(name)))%HUES.length];
  return `hsl(${hue} 75% 65%)`;
}
/* Image Steam d'une aventure (déduite du lien de la fiche du jeu) */
function steamAppId(g){ const m = (g?.link||'').match(/store\.steampowered\.com\/app\/(\d+)/); return m ? m[1] : null; }
/* Boutiques hors Steam dont on sait extraire l'image (Epic, GOG, Instant Gaming) */
const OG_HOSTS = ['store.epicgames.com','www.gog.com','gog.com','www.instant-gaming.com','instant-gaming.com'];
const OG_CACHE = {};
function ogUrl(link){ try{ const u = new URL(link); return (u.protocol==='https:' && OG_HOSTS.includes(u.hostname)) ? u.href : null; }catch(e){ return null; } }
/* Un lien dont on sait extraire l'image automatiquement (Steam ou boutique OG) */
function isAutoImageLink(link){ return /store\.steampowered\.com\/app\/\d+/.test(link||'') || !!ogUrl(link||''); }
function updateImgField(){
  const link = document.getElementById('f-link')?.value.trim() || '';
  const f = document.getElementById('f-img-field');
  if(f) f.style.display = isAutoImageLink(link) ? 'none' : 'block';
}
function arcGame(a){ return GAMES.find(x=>x.id===a.gameId) || GAMES.find(x=>x.name===a.gameName); }
/* Bannière du mode multigaming (image auto-générée, aucun fichier externe) */
const MULTI_IMG = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 215"><defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#8B7CFF"/><stop offset="1" stop-color="#221B45"/></linearGradient></defs><rect width="460" height="215" fill="url(#g)"/><text x="230" y="108" font-size="72" text-anchor="middle">🎮</text><text x="230" y="172" font-size="30" font-family="Arial,Helvetica,sans-serif" font-weight="bold" fill="#FFC857" text-anchor="middle" letter-spacing="7">MULTIGAMING</text></svg>');
/* Image d'un jeu : Steam > Epic/GOG/IG > image manuelle */
function gameImage(g){
  if(!g) return null;
  const id = steamAppId(g);
  if(id) return `https://cdn.cloudflare.steamstatic.com/steam/apps/${id}/header.jpg`;
  const o = ogUrl(g.link);
  if(o) return OG_CACHE[o]?.img || null; // chargée après coup par hydrateOg
  return g.img || null;
}
function arcImage(a){
  if(a.multi || a.kind === 'session') return MULTI_IMG;
  return gameImage(arcGame(a));
}
/* Charge après coup les images Epic/GOG/IG des bandeaux affichés */
async function hydrateOg(){
  for(const el of document.querySelectorAll('[data-og]')){
    const url = el.getAttribute('data-og');
    el.removeAttribute('data-og');
    try{
      let d = OG_CACHE[url];
      if(!d){
        const r = await fetch('/api/preview?url=' + encodeURIComponent(url));
        d = r.ok ? await r.json() : {};
        OG_CACHE[url] = d;
      }
      if(d.img && document.body.contains(el)){
        const im = document.createElement('img');
        im.src = d.img; im.alt = ''; im.loading = 'lazy';
        im.onerror = () => im.remove();
        el.appendChild(im);
      }
    }catch(e){ /* pas d'image, le fond dégradé reste */ }
  }
}
/* Badge d'état : Réussie ✓ / Échouée ✗ / Terminée / Commence dans X jours / En cours */
function arcStatusBadge(a){
  if(a.status !== 'en cours'){
    if(a.goal) return a.goalDone
      ? '<span class="arc-status win">✓ Objectif réussi</span>'
      : '<span class="arc-status fail">✗ Objectif raté</span>';
    return '<span class="arc-status off">Terminée</span>';
  }
  const today = todayStr();
  if(a.startDate > today){
    const days = Math.max(1, Math.round((new Date(a.startDate) - new Date(today)) / 86400000));
    return `<span class="arc-status soon">🗓️ Commence ${days === 1 ? 'demain' : 'dans ' + days + ' jours'}</span>`;
  }
  return '<span class="arc-status on">En cours</span>';
}
function hash(s){ let h=0; for(const c of s) h=(h*31 + c.charCodeAt(0))|0; return h; }
const initials = n => n.slice(0,2).toUpperCase();

/* ---------- Avatars & statuts ---------- */
const getProf = name => PROFILES[name] || {};
function pdotHtml(name, size, zoom){
  const p = getProf(name);
  let inner = esc(initials(name));
  if(p.avatar?.type === 'emoji') inner = `<span class="pemoji">${esc(p.avatar.value)}</span>`;
  else if(p.avatar?.type === 'url') inner = `<img class="avatar-img" src="${esc(p.avatar.value)}" alt="${esc(initials(name))}" onerror="this.remove()">`;
  const cls = size === 'xl' ? 'xl' : size === 'md' ? 'md' : size ? 'big' : '';
  const dot = `<span class="pdot ${cls}" data-member="${esc(name)}"${zoom?' data-zoom="1" style="cursor:zoom-in; background:'+memberColor(name)+'"':' style="background:'+memberColor(name)+'"'}>${inner}</span>`;
  const bord = cosmo(name, 'bordures');
  if(!bord || !bord.fichier) return dot;
  return `<span class="pdot-wrap">${dot}<img class="pdot-frame" src="/frames/${esc(bord.fichier)}" alt="" title="${esc(bord.nom)}"></span>`;
}
/* Nom du membre, coloré si une couleur de pseudo est équipée */
function nameHtml(name){
  const c = cosmo(name, 'couleurs');
  return c ? `<span class="gname gc-${esc(c.id)}">${esc(name)}</span>` : esc(name);
}
function statusDot(name){
  const st = getProf(name).status;
  if(!st || !STATUS[st]) return '';
  return `<span class="sdot" style="background:${STATUS[st].c}" title="${esc(STATUS[st].label)}"></span>`;
}
const fmt1 = v => (Math.round(v*10)/10).toString().replace('.',',');

function pchip(name, score){
  return `<span class="pchip">${pdotHtml(name)}${esc(name)}${score!=null?` <span class="score">${score}</span>`:''}</span>`;
}
function gauge(score){
  const s = Math.max(0, Math.min(10, score));
  return `<span class="gauge-wrap"><span class="gauge"><span class="gauge-fill" style="width:${s*10}%"></span><span class="gauge-ticks"></span></span><span class="gauge-num">${(Math.round(s*10)/10).toString().replace('.',',')}</span></span>`;
}
function avgOf(game){
  const vals = Object.values(game.ratings||{}).filter(v => typeof v === 'number');
  if(!vals.length) return null;
  return vals.reduce((a,b)=>a+b,0)/vals.length;
}
/* ---------- Promos & affichage prix ---------- */
const todayStr = () => new Date().toISOString().slice(0,10);
function promoActive(g){ return !!(g.promo && g.promo.price!=null && (!g.promo.until || g.promo.until >= todayStr())); }
function promoPct(g){
  if(!promoActive(g) || !(g.price>0)) return null;
  const pct = Math.round((1 - g.promo.price/g.price)*100);
  return pct>0 ? pct : null;
}
/* Le nom d'un jeu, cliquable vers sa page Steam/trailer si renseignée */
function gameName(g, stop){
  const n = esc(g.name);
  return g.link ? `<a class="game-link" data-game="${g.id}" href="${esc(g.link)}" target="_blank" rel="noopener"${stop?' onclick="event.stopPropagation()"':''}>${n}</a>` : n;
}
function priceLabel(g){
  const base = (g.price===0) ? '<span class="price">Gratuit</span>'
    : (g.price==null || g.price==='') ? '<span class="game-meta">prix ?</span>'
    : `<span class="price paid">${esc(g.price)} €</span>`;
  if(!promoActive(g)) return base;
  const pct = promoPct(g);
  const old = (g.price>0) ? `<span class="old-price">${esc(g.price)} €</span> ` : '';
  return `${old}<span class="price paid">${esc(g.promo.price)} €</span> <span class="promo-badge">🏷️ ${pct?`−${pct}%`:'PROMO'} · ${esc(g.promo.platform)}</span>`;
}
function toast(msg){
  document.querySelectorAll('.toast').forEach(t=>t.remove());
  const t = document.createElement('div'); t.className='toast'; t.textContent = msg;
  document.body.appendChild(t); setTimeout(()=>t.remove(), 2600);
}

/* ---------- Init + temps réel ---------- */
async function init(){
  ME = loadProfile();
  try{ await loadAll(); }
  catch(e){
    document.getElementById('app').innerHTML =
      '<div class="loading"><div class="pixel">SERVEUR EN COURS DE RÉVEIL...</div>' +
      '<p style="margin-top:12px">Sur l\u2019offre gratuite, le serveur s\u2019endort quand personne ne l\u2019utilise.<br>Ça peut prendre jusqu\u2019à une minute — nouvelle tentative automatique.</p></div>';
    setTimeout(init, 5000);
    return;
  }
  startLive();
  render();
  if(needDispoPrompt()) setTimeout(openDispoPrompt, 700);
}
let ES = null;
function startLive(){
  if(ES) return;
  try{
    ES = new EventSource('/api/events');
    ES.onmessage = async ev => {
      if(ev.data === 'update'){ try{ await loadAll(); render(); }catch(e){} }
    };
  }catch(e){ /* pas grave : le bouton Actualiser reste là */ }
}
async function refreshData(silent){
  try{ await loadAll(); }
  catch(e){ if(!silent) toast('Serveur injoignable — réessaie'); return; }
  render();
  if(!silent) toast('Données à jour');
}

/* ---------- Render root ---------- */
function render(){
  const app = document.getElementById('app');
  if(!ME){ app.innerHTML = renderOnboard(); return; }
  const toRate = GAMES.filter(g => g.ratings?.[ME] == null || (g.owned ? g.owned[ME] : undefined) === undefined).length;
  app.innerHTML = `
    <header>
      <div class="head-inner">
        <div class="logo">LA <span>GUILDE</span></div>
        <div class="head-spacer"></div>
        <span class="profile-chip">${pdotHtml(ME, 'md', true)}${esc(ME)}${statusDot(ME)}</span>
        <button class="head-btn" onclick="switchProfile()">Changer</button>
        <button class="head-btn" onclick="refreshData()" title="Recharger les données">⟳ Actualiser</button>
      </div>
      <nav>
        <button class="tab ${TAB==='panneau'?'active':''}" onclick="setTab('panneau')">Panneau général</button>
        <button class="tab ${TAB==='perso'?'active':''}" onclick="setTab('perso')">Mon espace${toRate?`<span class="badge">${toRate}</span>`:''}</button>
        <button class="tab ${TAB==='biblio'?'active':''}" onclick="setTab('biblio')">📚 Ma bibliothèque</button>
        <button class="tab ${TAB==='social'?'active':''}" onclick="setTab('social')">Social</button>
        <button class="tab ${TAB==='jeux'?'active':''}" onclick="setTab('jeux')">Tous les jeux</button>
        <button class="tab ${TAB==='aventures'?'active':''}" onclick="setTab('aventures')">Aventures</button>
        <button class="tab" onclick="GuildEconomy.openShop()">🛒 Boutique</button>
      </nav>
    </header>
    <main>${ TAB==='panneau' ? viewPanneau() : TAB==='perso' ? viewPerso() : TAB==='biblio' ? viewBiblio() : TAB==='social' ? viewSocial() : TAB==='jeux' ? viewJeux() : viewAventures() }</main>`;
  setTimeout(hydrateOg, 30);
}
function setTab(t){ if(t==='social') SOCIAL_SEL=null; TAB=t; refreshData(true); }
function switchProfile(){ ME=null; saveProfile(null); render(); }

/* ---------- Onboarding ---------- */
function renderOnboard(){
  return `<div class="onboard">
    <h1>LA <span>GUILDE</span></h1>
    <p>Le QG du groupe pour proposer des jeux, les noter, et enfin savoir à quoi jouer ensemble.<br>Qui es-tu ?</p>
    <div class="profiles">
      ${MEMBERS.map(m=>`<button class="profile-btn" onclick="pickProfile('${esc(m)}')">${pdotHtml(m, true)}${esc(m)}</button>`).join('')}
      <button class="profile-btn" style="border-style:dashed; color:var(--muted)" onclick="openAddMember()"><span class="pdot big" style="background:var(--panel2); color:var(--muted)">+</span>Nouveau joueur</button>
    </div>
  </div>`;
}
function openAddMember(){
  openModal(`
    <h2>Bienvenue dans La Guilde !</h2>
    <div class="sub">Ton pseudo apparaîtra pour tout le groupe : dans les notes, les campagnes et les notifs Discord. Choisis-le bien, on ne pourra pas le renommer facilement.</div>
    <div class="field"><label>Ton pseudo *</label><input type="text" id="nm-name" maxlength="30" placeholder="Ex : Maxou"></div>
    <div class="err" id="nm-err"></div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Annuler</button>
      <button class="btn primary" onclick="addMember()">Rejoindre la guilde 🎮</button>
    </div>`);
}
async function addMember(){
  const name = document.getElementById('nm-name').value.trim();
  if(!name) return showErr('nm-err','Il te faut un pseudo !');
  if(MEMBERS.some(m=>m.toLowerCase()===name.toLowerCase())) return showErr('nm-err','Ce pseudo existe déjà — c\u2019est peut-être toi ? Ferme et clique dessus.');
  try{
    await apiSend('/api/members', 'POST', { name });
  }catch(e){ return showErr('nm-err','Impossible d\u2019ajouter ce pseudo — réessaie.'); }
  await loadAll();
  closeModal();
  pickProfile(name);
  toast('Bienvenue dans La Guilde, ' + name + ' ! 👋');
}
function pickProfile(name){ ME=name; saveProfile(name); render(); if(needDispoPrompt()) setTimeout(openDispoPrompt, 500); }

/* ---------- Vue : Panneau général ---------- */
function viewPanneau(){
  const recent = [...GAMES].sort((a,b)=> new Date(b.addedAt)-new Date(a.addedAt)).slice(0,5);
  const activeArcs = ARCS.filter(a=>a.status==='en cours').sort((a,b)=> new Date(b.createdAt)-new Date(a.createdAt));
  const first3 = activeArcs.slice(0,3);
  const rest = activeArcs.slice(3,12);
  const promos = GAMES.filter(promoActive)
    .sort((a,b)=> (a.promo.until||'9999-99-99').localeCompare(b.promo.until||'9999-99-99'))
    .slice(0,5);
  return `
    <div class="card">
      <div class="eyebrow">Les 5 derniers jeux proposés</div>
      ${recent.length ? recent.map(g=>`
        <div class="game-row">
          <div class="game-head" style="cursor:default">
            <span class="game-name">${gameName(g)}</span>
            ${priceLabel(g)}
            <span class="game-meta">proposé par</span>${(g.proposedBy||[]).map(p=>pchip(p)).join('')}
            <span style="flex:1"></span>
            ${avgOf(g)!=null ? gauge(avgOf(g)) : '<span class="game-meta">pas encore noté</span>'}
          </div>
        </div>`).join('') : '<div class="empty">Aucun jeu pour l\u2019instant — sois le premier à en proposer un depuis ton espace.</div>'}

function pickColor(btn){
  btn.parentElement.querySelectorAll('.col-opt').forEach(b=>b.classList.remove('sel'));
  btn.classList.add('sel');
}
function pickAvatar(btn){
  btn.parentElement.querySelectorAll('.avatar-opt').forEach(b=>b.classList.remove('sel'));
  btn.classList.add('sel');
}
function pickLock(on){
  document.getElementById('lock-yes').classList.toggle('sel', on);
  document.getElementById('lock-no').classList.toggle('sel', !on);
}
async function saveAvatar(reset){
  const body = { member: ME };
  if(reset === null){
    body.avatar = null; body.color = null;
  } else {
    const url = document.getElementById('av-url').value.trim();
    const sel = document.querySelector('.avatar-opt.sel');
    const col = document.querySelector('.col-opt.sel');
    if(url) body.avatar = { type:'url', value:url };
    else if(sel) body.avatar = { type:'emoji', value: sel.dataset.a };
    if(col) body.color = col.dataset.c;
    const did = (document.getElementById('av-discord')?.value || '').trim();
    if(did === '') body.discordId = null;
    else if(/^\d{15,21}$/.test(did)) body.discordId = did;
    else return showErr('av-err','L\u2019ID Discord est une suite de 17-19 chiffres — vérifie ta copie.');
    body.lockPref = document.getElementById('lock-yes')?.classList.contains('sel') || false;
  }
  await apiSend('/api/profile', 'POST', body);
  await loadAll();
  toast('Profil mis à jour ✨');
  closeModal(); render();
}

/* ---------- Vue : Tous les jeux ---------- */
let SEARCH='', SORT='date';
function viewJeux(){
  let list = GAMES.filter(g => g.name.toLowerCase().includes(SEARCH.toLowerCase()));
  if(SORT==='date') list.sort((a,b)=> new Date(b.addedAt)-new Date(a.addedAt));
  if(SORT==='nom') list.sort((a,b)=> a.name.localeCompare(b.name,'fr'));
  if(SORT==='note') list.sort((a,b)=> (avgOf(b)??-1)-(avgOf(a)??-1));
  if(SORT==='prix') list.sort((a,b)=> (a.price??1e9)-(b.price??1e9));
  return `
    <div class="card">
      <div class="eyebrow">Le grimoire — ${GAMES.length} jeux proposés</div>
      <div class="sortbar">
        <input type="text" placeholder="Chercher un jeu…" value="${esc(SEARCH)}" oninput="SEARCH=this.value; rerenderJeux(this)">
        <select onchange="SORT=this.value; render()">
          <option value="date" ${SORT==='date'?'selected':''}>Plus récents</option>
          <option value="note" ${SORT==='note'?'selected':''}>Mieux notés</option>
          <option value="nom" ${SORT==='nom'?'selected':''}>A → Z</option>
          <option value="prix" ${SORT==='prix'?'selected':''}>Prix croissant</option>
        </select>
      </div>
      <div id="jeux-list">${list.map(gameRow).join('') || '<div class="empty">Aucun jeu ne correspond.</div>'}</div>
    </div>`;
}
function rerenderJeux(input){
  const pos = input.selectionStart;
  const listEl = document.getElementById('jeux-list');
  let list = GAMES.filter(g => g.name.toLowerCase().includes(SEARCH.toLowerCase()));
  if(SORT==='date') list.sort((a,b)=> new Date(b.addedAt)-new Date(a.addedAt));
  if(SORT==='nom') list.sort((a,b)=> a.name.localeCompare(b.name,'fr'));
  if(SORT==='note') list.sort((a,b)=> (avgOf(b)??-1)-(avgOf(a)??-1));
  if(SORT==='prix') list.sort((a,b)=> (a.price??1e9)-(b.price??1e9));
  listEl.innerHTML = list.map(gameRow).join('') || '<div class="empty">Aucun jeu ne correspond.</div>';
  input.setSelectionRange(pos,pos);
}

    <div class="game-head" onclick="document.getElementById('row-${g.id}').classList.toggle('open')">
      <span class="game-name">${gameName(g, true)}</span>
      ${(g.genres||[]).map(t=>`<span class="tag">${esc(t)}</span>`).join('')}
      ${priceLabel(g)}
      <span style="flex:1"></span>
      ${avg!=null ? gauge(avg) : '<span class="game-meta">pas encore noté</span>'}
    </div>

/* ---------- Vue : Aventures ---------- */
function viewAventures(){
  const active = ARCS.filter(a=>a.status==='en cours').sort((a,b)=> new Date(b.createdAt)-new Date(a.createdAt));
  const done = ARCS.filter(a=>a.status!=='en cours')
    .sort((a,b)=> new Date(b.endedAt||b.createdAt) - new Date(a.endedAt||a.createdAt));
  return `<div class="card">
    <div class="eyebrow">Aventures en cours</div>
    ${active.length ? active.map(a=>arcCard(a, a.createdBy===ME)).join('') : '<div class="empty">Aucune aventure en cours. Le prochain arc s\u2019écrit depuis « Mon espace ».</div>'}
  </div>
  ${done.length ? `<div class="card">
    <div class="eyebrow">🏁 Aventures terminées</div>
    ${done.map(a=>arcCard(a, a.createdBy===ME)).join('')}
  </div>` : ''}`;
}
function arcCard(a, canDelete){
  const on = a.status === 'en cours';
  const canEnd = on && (a.participants||[]).includes(ME);
  const n = (a.participants||[]).length;
  const canJoin = on && a.slots && n < a.slots && !(a.participants||[]).includes(ME);
  const canLeave = on && (a.participants||[]).includes(ME) && a.startDate > todayStr();
  const img = arcImage(a);
  const g2 = a.multi ? null : arcGame(a);
  const og = (!img && g2) ? ogUrl(g2.link) : null;
  const fallback = a.multi ? '🎮' : esc((a.gameName||'?').charAt(0).toUpperCase());
  const doneCls = on ? '' : (a.goal ? (a.goalDone ? 'done-win' : 'done-fail') : 'done');
  return `<div class="arc2 ${doneCls}">
    <div class="arc2-img"${og?` data-og="${esc(og)}"`:''}><span class="arc2-fallback">${fallback}</span>${img?`<img src="${img}" alt="" loading="lazy" onerror="this.remove()">`:''}</div>
    <div class="arc2-body">
      ${canDelete ? `<button class="trash-btn" style="position:absolute; top:8px; right:8px; float:none;" title="Supprimer cette campagne" onclick="openDeleteArc('${a.id}')">🗑️</button>` : ''}
      <div class="arc2-title">${esc(a.name)} ${arcStatusBadge(a)}${a.slots?`<span class="arc-status ${n>=a.slots?'off':'on'}" title="Places">${n}/${a.slots} 👥</span>`:''}</div>
      <div class="arc2-cols">
        <div class="arc2-people">${(a.participants||[]).map(p=>`<span title="${esc(p)}">${pdotHtml(p)}</span>`).join('')}</div>
        <div class="arc2-info">
          <div class="arc-game">▸ ${a.multi?'🎮 ':''}${esc(a.gameName)}</div>
          ${a.goal?`<div class="arc2-goal">🎯 ${esc(a.goal)} ${a.goalDone?'<span style="color:var(--green)">✅ atteint</span>':''}${(a.participants||[]).includes(ME)?` <a class="game-meta" href="#" onclick="setGoal('${a.id}', ${a.goalDone?'false':'true'}); return false;">${a.goalDone?'(rouvrir)':'(marquer atteint !)'}</a>`:''}</div>`:''}
          <div class="arc-meta" style="margin-top:5px">📅 ${fmtDate(a.startDate)}${a.time?` à ${esc(a.time).replace(':','h')}`:''} · lancée par ${esc(a.createdBy)}${!on && a.endedAt ? ` · <b>terminée le ${fmtDate(a.endedAt)}</b>` : ''}
            ${canEnd?` · <a href="#" onclick="endArc('${a.id}'); return false;">terminer</a>`:''}
            ${canLeave?` · <a href="#" style="color:var(--coral)" onclick="leaveArc('${a.id}'); return false;">se retirer</a>`:''}</div>
          ${canJoin?`<button class="btn primary btn-join" onclick="joinArc('${a.id}')">➕ Rejoindre l'aventure (${n}/${a.slots})</button>`:''}
          ${(() => {
            const isCamp = !(a.multi || a.kind === 'session');
            const isMember = (a.participants||[]).includes(ME);
            const full = a.slots && n >= a.slots;
            let extra = '';
            if(on && isCamp && isMember) extra += `<button class="mini-btn" style="margin-top:8px" onclick="openPlan('${a.id}',0)">🗓️ Planifier</button>`;
            if(on && isCamp && !isMember && full){
              extra += a.requests?.[ME]
                ? `<div class="arc-meta" style="margin-top:8px">⏳ Demande envoyée · <a href="#" onclick="cancelRequest('${a.id}'); return false;">retirer</a></div>`
                : `<button class="mini-btn" style="margin-top:8px" onclick="requestJoin('${a.id}')">🙋 Demander à rejoindre</button>`;
            }
            // Vote de difficulté : réservé aux NON-participants, fixe la récompense en GP
            if(on && isCamp && !isMember && a.goal && !a.goalDone){
              const mine = (a.diffVotes||{})[ME];
              const btn = (lv,lbl,gp)=>`<button class="mini-btn" style="margin-right:6px${mine===lv?';border-color:var(--gold);color:var(--gold)':''}" onclick="voteDifficulty('${a.id}','${lv}')">${lbl} · ${gp} GP</button>`;
              extra += `<div class="arc-meta" style="margin-top:8px">⚖️ Difficulté ${mine?`(ton vote : <b>${mine}</b>)`:'— ton avis ?'}<div style="margin-top:5px">${btn('facile','Facile',350)}${btn('normale','Normale',700)}${btn('difficile','Difficile',1500)}</div></div>`;
            }
            if(on && isCamp && isMember && a.goal && Object.keys(a.diffVotes||{}).length){
              extra += `<div class="arc-meta" style="margin-top:8px">⚖️ Difficulté votée : <b>${esc(arcDifficulty(a))}</b> → <span style="color:var(--gold)">${DIFF_GP[arcDifficulty(a)]} GP</span> par participant si réussie</div>`;
            }
            if(on && isCamp && isMember && a.requests && Object.keys(a.requests).length){
              extra += Object.entries(a.requests).map(([who,rq])=>`
                <div class="arc-meta" style="margin-top:8px">🙋 <b>${esc(who)}</b> veut rejoindre — ${
                  (rq.refusals||[]).includes(ME)
                    ? 'ton refus est enregistré'
                    : `<a href="#" style="color:var(--green)" onclick="decideRequest('${a.id}','${esc(who)}',true); return false;">accepter</a> · <a href="#" style="color:var(--coral)" onclick="decideRequest('${a.id}','${esc(who)}',false); return false;">refuser</a>`
                }</div>`).join('');
            }
            return extra;
          })()}
        </div>
      </div>
    </div>
  </div>`;
}
async function leaveArc(id){
  const r = await apiSend('/api/arcs/'+id+'/leave', 'POST', { member: ME });
  await loadAll();
  if(r.ok) toast('Tu t\u2019es retiré de l\u2019aventure');
  else if(r.reason==='started') toast('Trop tard, elle a déjà commencé — vois avec le groupe !');
  else if(r.reason==='not_in') toast('Tu ne fais pas partie de cette aventure');
  else if(r.reason==='closed') toast('Cette aventure est déjà terminée');
  render();
}
/* ---------- Difficulté d'une campagne (récompense en Guildpoints) ---------- */
const DIFF_GP = { facile:350, normale:700, difficile:1500 };
function arcDifficulty(a){
  const c = { facile:0, normale:0, difficile:0 };
  for(const lv of Object.values(a.diffVotes||{})) if(c[lv]!=null) c[lv]++;
  const max = Math.max(c.facile, c.normale, c.difficile);
  if(max<=0) return 'normale';
  if(c.normale===max) return 'normale';
  if(c.difficile===max) return 'difficile';
  return 'facile';
}
async function voteDifficulty(id, level){
  const r = await apiSend('/api/arcs/'+id+'/difficulty', 'POST', { member: ME, level });
  await loadAll();
  if(r.ok) toast('Vote enregistré : '+level);
  else if(r.reason==='participant') toast('Tu participes — tu ne peux pas voter ta propre difficulté');
  else if(r.reason==='done') toast('Objectif déjà atteint, le vote est figé');
  render();
}

/* ---------- Modales ---------- */
function openModal(html){
  closeModal();
  const ov = document.createElement('div'); ov.className='overlay'; ov.id='overlay';
  ov.innerHTML = `<div class="modal">${html}</div>`;
  ov.addEventListener('click', e => { if(e.target===ov) closeModal(); });
  document.body.appendChild(ov);
}
function closeModal(){ document.getElementById('overlay')?.remove(); }
function showErr(id,msg){ const e=document.getElementById(id); if(e){e.textContent=msg; e.style.display='block';} }

function scorePicker(name, current){
  return `<div class="score-picker" data-name="${name}">
    ${Array.from({length:11},(_,i)=>`<button type="button" class="score-btn ${current===i?'sel':''}" data-v="${i}" onclick="pickScore(this)">${i}</button>`).join('')}
  </div>`;
}
function pickScore(btn){
  btn.parentElement.querySelectorAll('.score-btn').forEach(b=>b.classList.remove('sel'));
  btn.classList.add('sel');
}
function getScore(container, name){
  const sel = container.querySelector(`.score-picker[data-name="${name}"] .score-btn.sel`);
  return sel ? parseInt(sel.dataset.v) : null;
}
function chipMulti(name, options, selected){
  return `<div class="chips" data-name="${name}">
    ${options.map(o=>`<button type="button" class="chip-opt ${selected?.includes(o)?'sel':''}" data-v="${esc(o)}" onclick="this.classList.toggle('sel')">${esc(o)}</button>`).join('')}
  </div>`;
}
function getChips(container, name){
  return [...container.querySelectorAll(`.chips[data-name="${name}"] .chip-opt.sel`)].map(b=>b.dataset.v);
}

function addGenreChip(){
  const inp = document.getElementById('f-newgenre');
  const v = inp.value.trim(); if(!v) return;
  const chips = document.querySelector('.chips[data-name="genres"]');
  const b = document.createElement('button');
  b.type='button'; b.className='chip-opt sel'; b.dataset.v=v; b.textContent=v;
  b.onclick=()=>b.classList.toggle('sel');
  chips.appendChild(b); inp.value='';
}
function togglePromoFields(on){
  document.getElementById('promo-yes').classList.toggle('sel', on);
  document.getElementById('promo-no').classList.toggle('sel', !on);
  document.getElementById('promo-fields').style.display = on ? 'block' : 'none';
}
async function saveGame(editId){
  const m = document.querySelector('.modal');
  const name = document.getElementById('f-name').value.trim();
  if(!name) return showErr('f-err','Il faut au moins le nom du jeu.');
  const genres = getChips(m,'genres');
  const link = document.getElementById('f-link').value.trim();
  const priceRaw = document.getElementById('f-price').value;
  const price = priceRaw === '' ? null : Math.max(0, parseFloat(priceRaw));
  const note = document.getElementById('f-note').value.trim();
  let img = '';
  if(!isAutoImageLink(link)){
    img = (document.getElementById('f-img')?.value || '').trim();
    if(img && !/^https:\/\//.test(img)) return showErr('f-err','L\u2019URL de l\u2019image doit commencer par https://');
  }

  if(editId){
    await apiSend('/api/games/'+editId, 'PUT', {name, genres, link, price, note, img});
    toast('Fiche mise à jour');
  } else {
    const envy = getScore(m,'envy');
    if(envy==null) return showErr('f-err','Donne ta note d\u2019envie (0 à 10) — c\u2019est tout l\u2019intérêt !');
    const dup = GAMES.find(g=>g.name.toLowerCase()===name.toLowerCase());
    if(dup) return showErr('f-err','« '+dup.name+' » est déjà dans la liste. Note-le plutôt depuis « Tous les jeux ».');
    let promo = null;
    if(document.getElementById('promo-yes')?.classList.contains('sel')){
      const pPrice = document.getElementById('f-promo-price').value;
      const pPlat = document.getElementById('f-promo-platform').value.trim();
      if(pPrice==='' || !pPlat) return showErr('f-err','Pour la promo, il faut au moins le nouveau prix et la plateforme.');
      promo = { price: Math.max(0, parseFloat(pPrice)), platform: pPlat, until: document.getElementById('f-promo-until').value || '', by: ME };
    }
    const game = { id:uid(), name, genres, link, price, note, img, proposedBy:[ME], ratings:{[ME]:envy}, promo };
    await apiSend('/api/games', 'POST', game);
    toast(name + ' proposé au groupe 🎮');
  }
  await loadAll();
  closeModal(); render();
}

async function saveNewRatings(){
  const m = document.querySelector('.modal');
  const updates = {};
  const owned = {};
  GAMES.forEach(g=>{
    const s = getScore(m,'rate-'+g.id); if(s!=null && s !== g.ratings?.[ME]) updates[g.id]=s;
    const o = getOwn(m, g.id); if(o!==null && o !== (g.owned ? g.owned[ME] : undefined)) owned[g.id]=o;
  });
  if(!Object.keys(updates).length && !Object.keys(owned).length){ closeModal(); return; }
  await apiSend('/api/ratings', 'POST', { member: ME, updates, owned });
  await loadAll();
  toast('Réponses enregistrées ⭐');
  closeModal(); render();
}

async function saveArc(kind){

  const name = document.getElementById('a-name').value.trim();
  if(!name) return showErr('a-err','Donne-lui un nom \u2014 c\u2019est plus \u00e9pique.');

/* ==================== DISPOS, HEATMAP & CRENEAUX ==================== */
function mondayOf(offset){ const d=new Date(); d.setHours(12,0,0,0); const wd=(d.getDay()+6)%7; d.setDate(d.getDate()-wd+(offset||0)*7); return d; }
function isoDate(d){ return d.toISOString().slice(0,10); }
function addDaysIso(mon, n){ const x=new Date(mon); x.setDate(x.getDate()+n); return isoDate(x); }
function availOf(member, day, slot){ return AVAIL.find(a=>a.member===member && a.day===day && a.slot===slot) || null; }
/* Heure de fin de chaque tranche : une tranche passée aujourd'hui est grisée */
const SLOT_END = { matin:12, aprem:18, '18-20':20, '20-22':22, '22-00':24, '00-02':26 };
function slotPast(d, sl, today){ return d < today || (d === today && new Date().getHours() >= SLOT_END[sl]); }

/* Grille d'une semaine — mode 'edit' (ma grille), 'view' (celle d'un ami), 'heat' (heatmap de campagne) */
function weekGridHtml(offset, mode, arcId){
  const mon = mondayOf(offset);
  const today = todayStr();
  const days = Array.from({length:7},(_,i)=> addDaysIso(mon, i));
  const arc = arcId ? ARCS.find(a=>a.id===arcId) : null;
  const team = arc ? (arc.participants||[]) : [];
  const head = '<tr><th></th>' + days.map((d,i)=>{ const [Y,Mo,Da]=d.split('-');
    return `<th>${DAY_LAB[i]}<span class="dnum">${Da}/${Mo}</span></th>`; }).join('') + '</tr>';
  const rows = DAY_SLOTS.map(sl => '<tr><td class="rowlabel">'+SLOT_LAB[sl]+'</td>' + days.map(d=>{
    const past = slotPast(d, sl, today);
    if(mode === 'heat'){
      const free = team.filter(m=>{ const a=availOf(m,d,sl); return a && (a.state==='free' || (a.state==='locked' && a.arc_id===arcId)); });
      const planned = SLOTS_DATA.find(s=>s.arcId===arcId && s.day===d && s.slot===sl);
      const alpha = team.length ? free.length/team.length : 0;
      const bg = free.length ? ` style="background:rgba(74,222,128,${(0.15+alpha*0.65).toFixed(2)}); border-color:rgba(74,222,128,.4)"` : '';
      const t = free.length ? `${free.length}/${team.length} dispo : ${free.join(', ')}` : 'Personne de dispo';
      return `<td class="${past?'cell-past':''}"${bg} title="${esc(t)}"${past?'':` onclick="openCreateSlot('${arcId}','${d}','${sl}')"`}>${planned?'\uD83D\uDCCC':(free.length||'')}</td>`;
    }
    const who = mode==='view' ? SOCIAL_SEL : ME;
    const a = availOf(who, d, sl);
    const locked = a && a.state==='locked';
    const free = a && a.state==='free';
    const cls = past ? 'cell-past' : locked ? 'cell-locked' : free ? 'cell-free' : '';
    const lockedArc = locked ? (ARCS.find(x=>x.id===a.arc_id)?.name || 'campagne') : '';
    const click = (mode==='edit' && !past && !locked) ? ` onclick="toggleAvail('${d}','${sl}',this)"` : '';
    return `<td class="${cls}"${locked?` title="\uD83D\uDD12 ${esc(lockedArc)}"`:''}${click}>${locked?'\uD83D\uDD12':(free?'\u2713':'')}</td>`;
  }).join('') + '</tr>').join('');
  return `<table class="week-grid">${head}${rows}</table>`;
}

/* ---------- Autocomplétion Steam ---------- */
let SUGGEST_TIMER = null, SUGGEST_ABORT = null, LAST_SUGGEST = [];
function steamSuggest(input){
  clearTimeout(SUGGEST_TIMER);
  const box = document.getElementById('f-suggest');
  const q = input.value.trim();
  if(q.length < 3){ if(box) box.innerHTML=''; return; }
  SUGGEST_TIMER = setTimeout(async ()=>{
    try{
      if(SUGGEST_ABORT) SUGGEST_ABORT.abort();
      SUGGEST_ABORT = new AbortController();
      const r = await fetch('/api/steam/search?q=' + encodeURIComponent(q), { signal: SUGGEST_ABORT.signal });
      if(!r.ok) return;
      const data = await r.json();
      LAST_SUGGEST = data.items || [];
      if(document.activeElement !== input || !LAST_SUGGEST.length){ if(box) box.innerHTML=''; return; }
      box.innerHTML = `<div class="suggest">${LAST_SUGGEST.map((i,idx)=>`
        <div class="suggest-item" onmousedown="pickSteam(${idx})">
          ${i.img?`<img src="${esc(i.img)}" alt="">`:''}
          <span class="suggest-name">${esc(i.name)}</span>
          <span class="suggest-price">${i.price===0?'Gratuit':i.price.toString().replace('.',',')+' €'}</span>
        </div>`).join('')}</div>`;
    }catch(e){ /* recherche annulée ou Steam indisponible : tant pis, on tape à la main */ }
  }, 300);
}
function pickSteam(idx){
  const it = LAST_SUGGEST[idx]; if(!it) return;
  document.getElementById('f-name').value = it.name;
  document.getElementById('f-link').value = 'https://store.steampowered.com/app/' + it.id;
  document.getElementById('f-price').value = it.price;
  const box = document.getElementById('f-suggest'); if(box) box.innerHTML='';
  toast('Lien et prix Steam remplis ✨ (vérifie et ajuste si besoin)');
}

/* ---------- Mini-fiche Steam au survol des noms de jeux ---------- */
let POP_EL = null, POP_TIMER = null;
const POP_CACHE = {};
document.addEventListener('mouseover', e => {
  const a = e.target.closest ? e.target.closest('a.game-link') : null;
  if(!a) return;
  const m = (a.href || '').match(/store\.steampowered\.com\/app\/(\d+)/);
  clearTimeout(POP_TIMER);
  if(m){ POP_TIMER = setTimeout(()=> showSteamPop(m[1], a), 350); return; }
  const o = ogUrl(a.href || '');
  if(o){ POP_TIMER = setTimeout(()=> showOgPop(o, a), 350); return; }
  const gg = GAMES.find(x => x.id === a.getAttribute('data-game'));
  if(gg && gg.img) POP_TIMER = setTimeout(()=> showLocalPop(gg, a), 350);
});
document.addEventListener('mouseout', e => {
  if(e.target.closest && e.target.closest('a.game-link')){ clearTimeout(POP_TIMER); hideSteamPop(); }
});
async function showSteamPop(id, anchor){
  try{
    let d = POP_CACHE[id];
    if(!d){
      const r = await fetch('/api/steam/app/' + id);
      if(!r.ok) return;
      d = await r.json();
      POP_CACHE[id] = d;
    }
    if(!document.body.contains(anchor)) return; // la page a changé entre-temps
    hideSteamPop();
    const rect = anchor.getBoundingClientRect();
    POP_EL = document.createElement('div');
    POP_EL.className = 'steam-pop';
    POP_EL.style.top = Math.max(8, Math.min(rect.bottom + 8, window.innerHeight - 270)) + 'px';
    POP_EL.style.left = Math.max(8, Math.min(rect.left, window.innerWidth - 316)) + 'px';
    POP_EL.innerHTML = `${d.img?`<img src="${esc(d.img)}" alt="">`:''}
      <div class="sp-body">
        <div class="sp-name">${esc(d.name)}</div>
        <div class="sp-desc">${esc((d.desc||'').slice(0,180))}${(d.desc||'').length>180?'…':''}</div>
        <div class="sp-meta">
          ${(d.genres||[]).map(t=>`<span class="tag">${esc(t)}</span>`).join('')}
          ${d.price?`<span class="price paid">${esc(d.price)}</span>`:''}
          ${d.release?`<span class="game-meta">${esc(d.release)}</span>`:''}
        </div>
      </div>`;
    document.body.appendChild(POP_EL);
  }catch(e){ /* aperçu indisponible : le lien reste cliquable */ }
}
function hideSteamPop(){ if(POP_EL){ POP_EL.remove(); POP_EL = null; } }

/* ---------- Avatar en grand au survol des pastilles de profil ---------- */
let AV_EL = null, AV_TIMER = null;
document.addEventListener('mouseover', e => {
  const d = e.target.closest ? e.target.closest('.pdot[data-zoom]') : null;
  if(!d) return;
  clearTimeout(AV_TIMER);
  AV_TIMER = setTimeout(()=> showAvatarPop(d.getAttribute('data-member'), d), 250);
});
document.addEventListener('mouseout', e => {
  if(e.target.closest && e.target.closest('.pdot[data-zoom]')){ clearTimeout(AV_TIMER); hideAvatarPop(); }
});
function showAvatarPop(name, anchor){
  if(!name || !document.body.contains(anchor)) return;
  hideAvatarPop();
  const p = getProf(name);
  let inner = `<span style="font-size:64px; font-weight:800; color:#0F1118">${esc(initials(name))}</span>`;
  if(p.avatar?.type === 'emoji') inner = `<span style="font-size:110px; line-height:1">${esc(p.avatar.value)}</span>`;
  else if(p.avatar?.type === 'url') inner = `<img src="${esc(p.avatar.value)}" alt="" style="width:100%; height:100%; object-fit:cover" onerror="this.remove()">`;
  const rect = anchor.getBoundingClientRect();
  AV_EL = document.createElement('div');
  AV_EL.className = 'avatar-pop';
  AV_EL.style.top = Math.max(8, Math.min(rect.bottom + 8, window.innerHeight - 290)) + 'px';
  AV_EL.style.left = Math.max(8, Math.min(rect.left, window.innerWidth - 250)) + 'px';
  AV_EL.innerHTML = `<div class="avatar-pop-circle" style="background:${memberColor(name)}">${inner}</div>
    <div class="avatar-pop-name">${esc(name)} ${statusDot(name)}</div>
    ${p.tagline?`<div class="avatar-pop-tag">${esc(p.tagline)}</div>`:''}`;
  document.body.appendChild(AV_EL);
}
function hideAvatarPop(){ if(AV_EL){ AV_EL.remove(); AV_EL = null; } }
function showLocalPop(g, anchor){
  if(!document.body.contains(anchor)) return;
  hideSteamPop();
  const rect = anchor.getBoundingClientRect();
  POP_EL = document.createElement('div');
  POP_EL.className = 'steam-pop';
  POP_EL.style.top = Math.max(8, Math.min(rect.bottom + 8, window.innerHeight - 270)) + 'px';
  POP_EL.style.left = Math.max(8, Math.min(rect.left, window.innerWidth - 316)) + 'px';
  POP_EL.innerHTML = `<img src="${esc(g.img)}" alt="" onerror="this.remove()">
    <div class="sp-body">
      <div class="sp-name">${esc(g.name)}</div>
      ${g.note?`<div class="sp-desc">${esc(g.note.slice(0,180))}${g.note.length>180?'…':''}</div>`:''}
      <div class="sp-meta">
        ${(g.genres||[]).map(t=>`<span class="tag">${esc(t)}</span>`).join('')}
        ${g.price===0?'<span class="price">Gratuit</span>':(g.price!=null?`<span class="price paid">${esc(g.price)} €</span>`:'')}
      </div>
    </div>`;
  document.body.appendChild(POP_EL);
}

async function showOgPop(url, anchor){
  try{
    let d = OG_CACHE[url];
    if(!d){
      const r = await fetch('/api/preview?url=' + encodeURIComponent(url));
      if(!r.ok) return;
      d = await r.json();
      OG_CACHE[url] = d;
    }
    if(!d || (!d.img && !d.name)) return;
    if(!document.body.contains(anchor)) return;
    hideSteamPop();
    const rect = anchor.getBoundingClientRect();
    POP_EL = document.createElement('div');
    POP_EL.className = 'steam-pop';
    POP_EL.style.top = Math.max(8, Math.min(rect.bottom + 8, window.innerHeight - 270)) + 'px';
    POP_EL.style.left = Math.max(8, Math.min(rect.left, window.innerWidth - 316)) + 'px';
    POP_EL.innerHTML = `${d.img?`<img src="${esc(d.img)}" alt="">`:''}
      <div class="sp-body">
        <div class="sp-name">${esc(d.name || '')}</div>
        <div class="sp-desc">${esc((d.desc||'').slice(0,180))}${(d.desc||'').length>180?'…':''}</div>
      </div>`;
    document.body.appendChild(POP_EL);
  }catch(e){ /* aperçu indisponible : le lien reste cliquable */ }
}

init();
</script>
